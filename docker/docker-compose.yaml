version: "3"
services:
  mysql:
    # 1. 授权root远程访问
    # GRANT ALL ON *.* TO 'root'@'%';
    # 2. 报错执行
    # update user set host='%' where user='root';
    # 再执行步骤1
    # 3. 刷新权限
    # flush privileges;
    networks:
      - etherscan
    image: docker.m.daocloud.io/mysql:8.0.36
    container_name: mysql8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    command: 
      --default-authentication-plugin=mysql_native_password
      --lower_case_table_names=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    volumes:
      - /etc/localtime:/etc/localtime
      - /home/docker-compose/mysql/data:/var/lib/mysql
      - /home/docker-compose/mysql/conf/my.cnf:/etc/mysql/my.cnf
      - /home/docker-compose/mysql/logs:/var/log/mysql
      - /home/docker-compose/mysql/mysql-files:/var/lib/mysql-files
networks:
  etherscan:
